#Import .env.properties
spring.config.import=optional:file:.env.properties

#MySQL Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#Server Configuration
server.servlet.context-path=${SERVLET_PATH}

#JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#Email Configuration
# spring.mail.host=smtp-relay.brevo.com
# spring.mail.port=587
# spring.mail.username=${BREVO_USERNAME}
# spring.mail.password=${BREVO_PASSWORD}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
# spring.mail.protocol=smtp
# spring.mail.properties.mail.smtp.from=${BREVO_FROM_EMAIL}

#Brevo HTTP Service
brevo.api.key=${BREVO_API_KEY}
brevo.from.email=${BREVO_FROM_EMAIL}


#JWT Configuration
jwt.secret=${JWT_SECRET}

#Port Configuration
#Falls back to 8080 locally
server.port=${PORT:8080}


#URL Configuration
money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL}
app.activation.url=${MONEY_MANAGER_BACKEND_URL}

#Set which profile to activate
spring.profiles.active=prod